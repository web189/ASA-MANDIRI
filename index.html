  <title>ASA MANDIRI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<div class="container">
<body>

<header class="main-header">
  <div class="header-content">
    
    <div class="logo-wrapper">
      <img src="favicon.png" alt="ASA MANDIRI" class="logo-header">
    </div>

    <div class="header-text">
      <h1>ASA MANDIRI</h1>
      <p>Grosir Lengkap • Harga Bersahabat</p>
	   <span id="jam"></span>
    </div>

  </div>
 
</header>

<section class="top-bar">
<select id="role">
  <option value="tamu">Tamu</option>
  <option value="admin">Admin</option>
  <option value="kasir">Kasir</option>
</select>
  <input type="text" id="search" placeholder="Cari barang...">
</section>

<section id="formBarang" class="card">
  <h3>Input Barang</h3>
  <div class="grid">
    <input id="kode" placeholder="Kode">
    <input id="nama" placeholder="Nama">
    <input id="modal" type="number" placeholder="Modal">
    <input id="harga" type="number" placeholder="Harga">
    <input id="qty" type="number" placeholder="Qty Masuk">
  </div>
  <button id="btnTambah">Simpan</button>
</section>

<section id="kasSection" class="card">
  <h3>Manajemen Kas</h3>
  <div class="grid">
    <input id="kasInput" type="number" placeholder="Jumlah">
    <select id="tipeKas">
      <option value="masuk">Kas Masuk (+)</option>
      <option value="keluar">Kas Keluar (-)</option>
    </select>
  </div>
  <button id="btnKas">Update Kas</button>
</section>

<section class="card table-section">
  <table>
    <thead>
      <tr>
        <th>No</th>
        <th>Nama</th>
        <th>Modal</th>
        <th>Harga</th>
        <th>Qty Awal</th>
        <th>Terjual</th>
        <th>Sisa</th>
        <th>Total</th>

        <th>Status</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody id="dataTable"></tbody>
  </table>
</section>

<section class="card summary">
  <p>Total Penjualan: <b id="totalPenjualan"></b></p>
  <p>Total Laba: <b id="totalLaba"></b></p>
  <p>Kas: <b id="kas"></b></p>
</section>

<script src="app.js"></script>
</body>
</div>
</html>
